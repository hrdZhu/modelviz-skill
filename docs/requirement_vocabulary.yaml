# 用户需求解析标准词表。
# 用途：把自然语言绘图需求归一化为模板检索条件；不包含匹配和排序逻辑。
version: 1
source: docs/template_catalog.yaml

# 模板分类：标准值与 template_catalog.yaml 中的 category 保持一致。
template_categories:
