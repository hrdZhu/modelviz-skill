    label: 聚类降维
    synonyms: [聚类, 降维, 主成分分析, PCA, PCoA, RDA, 排序分析]
  comparison_ranking:
    label: 比较排序
    synonyms: [比较, 对比, 排名, 排序, 多组比较, 方案对比]
  composite_evaluation:
    label: 综合评价
    synonyms: [综合评价, 评价总览, 多指标评价, 综合评估]
  distribution_uncertainty:
    label: 分布与不确定性
    synonyms: [分布, 不确定性, 误差, 显著性, 组间差异]
  multi_panel_report:
    label: 多面板报告
    synonyms: [组合图, 拼图, 多面板, 综合报告, 报告图]
  network_flow:
    label: 网络与集合关系
    synonyms: [网络, 关系网络, 流向, 和弦图, 韦恩图, 集合交集]
  optimization_decision:
    label: 优化决策
    synonyms: [优化, 参数选择, 决策, 最优参数, HANTS]
  prediction_evaluation:
    label: 预测评估
    synonyms: [预测, 模型评估, 回归评估, 分类评估, ROC, 学习曲线]
  relationship_correlation:
    label: 关系相关
    synonyms: [相关性, 关联, 关系, 相关矩阵, 散点回归]
  sensitivity_robustness:
    label: 敏感性与稳健性
    synonyms: [敏感性, 稳健性, 特征重要性, SHAP, PDP, GAM, ALE]
  spatial_geographic:
    label: 空间地理
    synonyms: [空间, 地理, 地图, 栅格, 遥感, 移动窗口]
  trend_time_series:
    label: 趋势与时间序列
