  不要饼图: [别画饼图, 不想要饼, 不用环形图, 不要甜甜圈图]
  做得高级: [好看一点, 像论文, 科研感, 专业一点]
  看趋势: [变化趋势, 随时间变化, 年度变化, 曲线走势]
  看差异: [比较差别, 对比大小, 组间差异, 谁更好]
  看关系: [有没有关系, 相关不相关, 变量关联, 影响关系]
  看贡献: [哪个因素重要, 变量重要性, 特征贡献, 驱动因素]
  看误差: [误差范围, 不确定性, 置信区间, 残差]
  综合展示: [放一张图里, 做成组合图, 多个子图, 汇总报告图]

# 需要人工确认的词：这些词在 catalog 中存在重复或边界较模糊，暂不强行删除。
review_terms:
  - term: 热图 / 热力图
    note: 两者在用户表达中基本同义，建议统一到“热图”。
  - term: 环形图 / 环状图 / 圆形图
    note: 可能指 donut、circular heatmap、circular bar，需要结合功能判断。
  - term: 玫瑰图 / 南丁格尔玫瑰图 / 极区图
    note: 通常可合并，但 SHAP 玫瑰图和普通比例玫瑰图语义不同。
  - term: 相关性 / 关系 / 关联
    note: 可作为同义入口，但具体图表需区分热图、散点、网络和结构方程。
  - term: 模型评价 / 预测评估 / 综合评价
    note: 都和模型结果有关，但分类、回归、综合仪表盘的模板不同。
  - term: 3D / 三维 / 立体
    note: 既可能是明确图表类型，也可能只是视觉风格偏好。
  - term: 多面板 / 组合图 / 报告图
    note: 可作为使用场景或图表结构，需要后续解析时保留上下文。
  - term: 空间地图 / 栅格 / 遥感
    note: 普通地图展示和逐像元建模分析差别较大，需要确认数据类型。
